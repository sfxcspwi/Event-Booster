<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>event-booster</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bilbo+Swash+Caps&family=Cormorant+Upright:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Italiana&family=Kaushan+Script&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

  </head>
  <body>
    <div id="app"></div>

    <header class="header">
        <div class="container">
            <div class="logo__bg">
                <a href="index.html"><img class="logo__img" src="/src/img/logo.png" alt="logo"></a>
            </div>
            
            <h1 class="header__title">FIND BEST EVENTS AROUND THE WORLD</h1>

            <div>
                <ul class="header__list">
                    <li>
                        <div class="header__input-wrap">
                            <input class="header__input search-input" type="text" name="" id="" placeholder="Start searching">
                            
                            <svg class="header__svg" width="12px" height="12px"> 
                                <use href="/public/symbols.svg#search"></use>
                            </svg>
                        </div>
                    </li>

                    <li>
                        <div class="header__input-wrap">
                            <input class="header__input country-input" type="text" name="" id="" placeholder="Choose country">
                            
                            <svg class="header__svg" width="12px" height="12px"> 
                                <use href="/public/symbols.svg#arrow"></use>
                            </svg>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <div class="main__bg">

        <main class="container">
            <ul class="main__list"></ul>
                
            <div class="back-drop is-hidden" data-modal></div>

            <ul class="main__pages"></ul>
        </main>

        <footer class="container">
            <p class="footer__text">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
        </footer>

    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
